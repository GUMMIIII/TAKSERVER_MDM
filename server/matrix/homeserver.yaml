# ─────────────────────────────────────────────────────────────────────────────
#  Matrix / Synapse – homeserver.yaml  (envsubst template)
#  Variables are substituted by setup_server.sh at first run.
# ─────────────────────────────────────────────────────────────────────────────

server_name: "${MATRIX_DOMAIN}"
public_baseurl: "${MATRIX_PUBLIC_BASEURL}"

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

# Database (PostgreSQL)
database:
  name: psycopg2
  args:
    user: "${DB_USER}"
    password: "${DB_PASS}"
    database: synapse
    host: postgres
    cp_min: 5
    cp_max: 10
  allow_unsafe_locale: true

# Redis (worker/session cache)
redis:
  enabled: true
  host: redis
  port: 6379

# Media storage
media_store_path: /data/media_store
max_upload_size: 50M

# Logging
log_config: /data/log.config

# Secrets
macaroon_secret_key: "${MATRIX_MACAROON_SECRET}"
form_secret: "${MATRIX_FORM_SECRET}"
registration_shared_secret: "${MATRIX_REGISTRATION_SHARED_SECRET}"

# Registration disabled – all users come from LDAP
enable_registration: false

# Federation – disabled for closed deployment
federation_domain_whitelist: []
allow_public_rooms_over_federation: false

# Signing key
signing_key_path: /data/signing.key

# Room defaults
default_room_version: "11"

# Encryption on by default for all new rooms
encryption_enabled_by_default_for_room_type: all

# No telemetry
report_stats: false

# ── LDAP Authentication (via LLDAP) ──────────────────────────────────────────
# Users authenticate with their LLDAP username + password.
# Accounts are created in Synapse on first successful LDAP login.
password_providers:
  - module: "ldap_auth_provider.LdapAuthProvider"
    config:
      enabled: true
      mode: "search"
      uri: "ldap://lldap:3890"
      start_tls: false
      base: "ou=people,${LDAP_BASE_DN}"
      attributes:
        uid: "uid"
        mail: "mail"
        name: "displayName"
      bind_dn: "uid=admin,ou=people,${LDAP_BASE_DN}"
      bind_password: "${LDAP_ADMIN_PASS}"
      filter: "(objectClass=person)"

# ── OIDC SSO (Authelia) ──────────────────────────────────────────────────────
# After Authelia login the browser is redirected back to Element automatically.
# allow_existing_users links OIDC logins to accounts already created via LDAP.
oidc_providers:
  - idp_id: authelia
    idp_name: "KOMMS SSO"
    discover: true
    issuer: "https://auth.${DOMAIN}"
    client_id: "synapse"
    client_secret: "${SYNAPSE_OIDC_SECRET}"
    scopes: ["openid", "profile", "email"]
    user_profile_method: "userinfo_endpoint"
    user_mapping_provider:
      config:
        localpart_template: "{{ user.preferred_username | lower }}"
        display_name_template: "{{ user.name }}"
    allow_existing_users: true
