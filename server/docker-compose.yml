# ─────────────────────────────────────────────────────────────────────────────
#  KOMMS Platform – Docker Compose
#  Services: Nginx · LLDAP (SSO) · Headwind MDM · PostgreSQL · OpenVPN
#            TAKServer · Matrix/Synapse · Redis · Mumble · Nextcloud
#
#  Start:       docker compose up -d
#  Stop:        docker compose down
#  Local test:  run generate-configs.sh first, then docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

networks:
  komms_internal:
    driver: bridge
  komms_vpn:
    driver: bridge

volumes:
  postgres_data:
  headwind_files:
  headwind_work:
  openvpn_data:
  synapse_data:
  mumble_data:
  nextcloud_data:
  redis_data:
  nginx_certs:
  lldap_data:
  authelia_data:

services:

  # ── Authelia – SSO / Forward-Auth Gateway ───────────────────────────────
  # Portal: https://auth.DOMAIN  — cookie covers all *.DOMAIN subdomains
  # Secrets injected via AUTHELIA_* environment variables (from .env)
  authelia:
    image: authelia/authelia:latest
    container_name: komms_authelia
    restart: unless-stopped
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: ${LDAP_ADMIN_PASS}
      AUTHELIA_STORAGE_POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - authelia_data:/config
    networks:
      - komms_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      lldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Reverse Proxy ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: komms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_certs:/etc/letsencrypt
      - ./dashboard:/etc/nginx/dashboard:ro
    networks:
      komms_internal:
        aliases:
          - auth.${DOMAIN}
          - cloud.${DOMAIN}
          - element.${DOMAIN}
          - matrix.${DOMAIN}
    depends_on:
      - authelia
      - headwind
      - nextcloud
      - synapse
      - lldap
      - element-web

  # ── Element Web (Matrix client) ──────────────────────────────────────────
  element-web:
    image: vectorim/element-web:latest
    container_name: komms_element
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - komms_internal

  # ── PostgreSQL (shared database) ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: komms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: hmdm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    networks:
      - komms_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Synapse session cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: komms_redis
    restart: unless-stopped
    networks:
      - komms_internal

  # ── LLDAP – Lightweight LDAP / SSO ───────────────────────────────────────
  # Web UI available at https://SERVER/ldap (operator only, via VPN)
  # All services authenticate against this LDAP server.
  lldap:
    image: lldap/lldap:stable
    container_name: komms_lldap
    restart: unless-stopped
    ports:
      - "127.0.0.1:17170:17170"   # web UI – localhost only, proxied via nginx
    environment:
      LLDAP_JWT_SECRET: ${LLDAP_JWT_SECRET}
      LLDAP_LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=komms,dc=local}
      LLDAP_LDAP_USER_PASS: ${LDAP_ADMIN_PASS}
      LLDAP_HTTP_URL: http://127.0.0.1:17170
      LLDAP_DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres/lldap
    volumes:
      - lldap_data:/data
    networks:
      - komms_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:17170/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Headwind MDM ─────────────────────────────────────────────────────────
  headwind:
    image: headwindmdm/hmdm:latest
    container_name: komms_headwind
    restart: unless-stopped
    environment:
      SQL_HOST: postgres
      SQL_PORT: 5432
      SQL_BASE: hmdm
      SQL_USER: ${DB_USER}
      SQL_PASS: ${DB_PASS}
      BASE_DOMAIN: ${HEADWIND_DOMAIN}
      PROTOCOL: http
      ADMIN_EMAIL: ${HMDM_ADMIN_EMAIL}
    volumes:
      - headwind_files:/opt/hmdm/files
      - headwind_work:/usr/local/tomcat/work
      - ./headwind/hmdm_init.en.sql:/opt/hmdm/templates/sql/hmdm_init.en.sql:ro
    networks:
      - komms_internal
    depends_on:
      postgres:
        condition: service_healthy

  # ── OpenVPN ──────────────────────────────────────────────────────────────
  openvpn:
    image: kylemanna/openvpn:latest
    container_name: komms_openvpn
    restart: unless-stopped
    ports:
      - "${VPN_PORT:-1194}:1194/udp"
    volumes:
      - openvpn_data:/etc/openvpn
      - ./openvpn/verify_ldap.sh:/etc/openvpn/auth/verify_ldap.sh:ro
    cap_add:
      - NET_ADMIN
    networks:
      - komms_internal
      - komms_vpn
    sysctls:
      - net.ipv4.ip_forward=1

  # ── dnsmasq – Split-horizon DNS for VPN clients ─────────────────────────
  # Listens on tun0 (${VPN_SUBNET%.0}.1 = 10.8.0.1 by default).
  # OpenVPN pushes this IP as dhcp-option DNS to all clients.
  # Resolves *.DOMAIN → 10.8.0.1 so VPN clients reach nginx through the
  # tunnel (nginx sees 10.8.0.x → geo check passes).
  # network_mode: host required to bind to tun0 (created by OpenVPN).
  dnsmasq:
    build:
      context: ./dnsmasq
    image: komms/dnsmasq:latest
    container_name: komms_dnsmasq
    restart: unless-stopped
    network_mode: "container:komms_openvpn"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
    depends_on:
      - openvpn

  # ── TAKServer ────────────────────────────────────────────────────────────
  # Requires the TAKServer Docker image from tak.gov (free account).
  # Run setup_tak.sh to load the image and perform first-time setup.
  takserver:
    image: ${TAK_IMAGE:-takserver/takserver:5.3-RELEASE-35}
    container_name: komms_tak
    restart: unless-stopped
    ports:
      - "8089:8089"     # ATAK/WinTAK client (TLS)
      - "8443:8443"     # WebTAK + admin UI
      - "8444:8444"     # Certificate enrollment (mTLS)
      - "8446:8446"     # Cert-based HTTPS (no client auth)
    volumes:
      - ${TAK_DIR:-/opt/komms/tak}:/opt/tak
      - ./takserver/CoreConfig.xml:/opt/tak/CoreConfig.xml
    networks:
      - komms_internal
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: tak
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      lldap:
        condition: service_healthy

  # ── Matrix / Synapse ─────────────────────────────────────────────────────
  # Custom image (extends matrixdotorg/synapse) to include matrix-synapse-ldap3
  synapse:
    build:
      context: ./matrix
      dockerfile: Dockerfile
    image: komms/synapse:latest
    container_name: komms_synapse
    restart: unless-stopped
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - synapse_data:/data
      - ./matrix/homeserver.yaml:/data/homeserver.yaml:ro
      - ./matrix/log.config:/data/log.config:ro
    networks:
      - komms_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      lldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8008/_matrix/client/versions\")'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ── Mumble ───────────────────────────────────────────────────────────────
  mumble:
    image: mumblevoip/mumble-server:v1.4.287
    container_name: komms_mumble
    restart: unless-stopped
    ports:
      - "64738:64738"
      - "64738:64738/udp"
    volumes:
      - ./mumble/murmur.ini:/etc/mumble/murmur.ini:ro
      - mumble_data:/data
    networks:
      - komms_internal
    environment:
      MUMBLE_SUPERUSER_PASSWORD: ${MUMBLE_SUPERUSER_PASS}

  # ── Nextcloud ────────────────────────────────────────────────────────────
  nextcloud:
    image: nextcloud:29-apache
    container_name: komms_nextcloud
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_PASS}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_TRUSTED_DOMAIN}
      REDIS_HOST: redis
    volumes:
      - nextcloud_data:/var/www/html
    networks:
      - komms_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      lldap:
        condition: service_healthy
