# ─────────────────────────────────────────────────────────────────────────────
#  KOMMS – Nginx Reverse Proxy
#  Routes: /mdm → Headwind MDM  |  /nextcloud → Nextcloud
#          /_matrix → Synapse   |  /ldap → LLDAP web UI
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    autoindex off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options         SAMEORIGIN    always;
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         no-referrer   always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/komms.crt;
        ssl_certificate_key /etc/nginx/certs/komms.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # ── Headwind MDM ──────────────────────────────────────────────────────
        # Publicly accessible for initial QR enrollment (before VPN)
        location /mdm/ {
            proxy_pass         http://headwind:8080/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            client_max_body_size 512m;
        }

        # ── Nextcloud ─────────────────────────────────────────────────────────
        location /nextcloud/ {
            proxy_pass         http://nextcloud/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            client_max_body_size 10g;

            # WebDAV support
            proxy_set_header   Destination       $http_destination;
        }

        # ── Matrix / Synapse ──────────────────────────────────────────────────
        location /_matrix/ {
            proxy_pass         http://synapse:8008;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            client_max_body_size 50m;
        }

        location /_synapse/ {
            proxy_pass         http://synapse:8008;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Matrix .well-known discovery (used by Element app auto-config) ─────
        location /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{"m.homeserver":{"base_url":"https://$host"}}';
        }
        location /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{"m.server":"$host:443"}';
        }

        # ── LLDAP – User Management (restrict to VPN / internal) ──────────────
        # Access control: only allow VPN subnet (10.8.0.0/24 default)
        # Operators manage users at https://SERVER/ldap
        location /static/ {
            proxy_pass         http://lldap:17170/static/;
        }

        location /auth/ {
            proxy_pass         http://lldap:17170/auth/;
        }

        location /api/ {
            proxy_pass         http://lldap:17170/api/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        location /ldap/ {
            proxy_pass         http://lldap:17170/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ── Element Web – Matrix client ──────────────────────────────────────────
    server {
        listen 8080 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/komms.crt;
        ssl_certificate_key /etc/nginx/certs/komms.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        location / {
            proxy_pass         http://element-web:80/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
