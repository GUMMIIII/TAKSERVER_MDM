# ─────────────────────────────────────────────────────────────────────────────
#  Mumble / Murmur – Server Configuration
# ─────────────────────────────────────────────────────────────────────────────

# Network
port=64738
host=0.0.0.0

# Server name (shown in client) — set by setup_server.sh
registerName=KOMMS Voice

# Join password — required to connect (set by setup_server.sh)
serverpassword=

# Max clients
users=50

# Max bandwidth per client (bits/sec)
bandwidth=72000

# Welcome message
welcometext=<b>KOMMS Voice Server</b><br>Authorised users only.

# Logging
logfile=/data/murmur.log
logdays=31

# Database
database=/data/murmur.sqlite

# RPC (for management tools)
grpc=127.0.0.1:50051

# ICE (disabled)
ice=

# Timeout (seconds)
timeout=30

# Allow HTML in messages
allowhtml=false

# Opus codec (modern, efficient)
opusthreshold=100

# Require users to be registered (no anonymous access)
# Set to 1 to require authentication
allowguests=0

# SSL — handled by host; mumble uses its own cert
sslCert=/data/mumble.pem
sslKey=/data/mumble.key
