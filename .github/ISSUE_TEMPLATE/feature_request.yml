name: Feature request
description: Suggest a new service, integration, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. A few things to keep in mind:

        - This is a solo-maintained hobby project. Big requests may take a while
          or get declined depending on free-time budget.
        - "Would be cool if..." is fine, but the more specific you can be about
          the actual use-case, the more likely it gets prioritized.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
      placeholder: |
        e.g. "Our team rotates devices weekly and I'd like add_user.sh to
        re-issue certs to an existing user without deleting them first."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Rough idea of what you'd want. UI, command, config option, new service?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you tried, or other approaches you thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Scope (rough guess)
      options:
        - Small (config change, doc fix, single script tweak)
        - Medium (new flag / option / minor service integration)
        - Large (new service, architectural change)
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: contributing
    attributes:
      label: Would you be willing to contribute?
      options:
        - label: Yes, I can submit a PR if we agree on the approach
        - label: I can help test once it's implemented
        - label: I'm just suggesting, no implementation help
